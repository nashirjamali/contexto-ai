name: contexto

services:
  postgres:
    image: pgvector/pgvector:pg16
    networks:
      - contexto-internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-contexto}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  contexto-internal:
    name: contexto-internal

volumes:
  postgres_data:
    name: contexto-postgres-data
