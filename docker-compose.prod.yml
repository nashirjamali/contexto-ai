services:
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: contexto

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/contexto
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: https://${DOMAIN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-4096}
      APP_NAME: ${APP_NAME:-Contexto}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    volumes:
      - uploads:/app/apps/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contexto-internal
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.contexto-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.contexto-api.entrypoints=websecure
      - traefik.http.routers.contexto-api.tls=true
      - traefik.http.routers.contexto-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.contexto-api.priority=100
      - traefik.http.routers.contexto-api.middlewares=contexto-uploads
      - traefik.http.middlewares.contexto-uploads.buffering.maxRequestBodyBytes=30000000
      - traefik.http.services.contexto-api.loadbalancer.server.port=3001

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
        NEXT_PUBLIC_APP_URL: https://${DOMAIN}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.contexto-web.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.contexto-web.entrypoints=websecure
      - traefik.http.routers.contexto-web.tls=true
      - traefik.http.routers.contexto-web.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.contexto-web.priority=1
      - traefik.http.services.contexto-web.loadbalancer.server.port=3000

networks:
  contexto-internal:
    internal: true
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}

volumes:
  uploads:
    name: contexto-uploads
