services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contexto-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contexto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contexto"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
